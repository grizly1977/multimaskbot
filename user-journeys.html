<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimasking Academy Bot — User Journeys</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─────────────────────────────── */
#hdr{background:#1e293b;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#hdr-left{display:flex;align-items:center;gap:12px}
#hdr h1{font-size:16px;font-weight:700;letter-spacing:.2px}
#hdr p{font-size:12px;color:#94a3b8}
#hdr-badge{background:#6366f1;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}

/* ─── Journey selector ───────────────────── */
#jbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto}
#jbar .jlbl{font-size:11px;font-weight:700;color:#94a3b8;white-space:nowrap;margin-right:4px;text-transform:uppercase;letter-spacing:.5px}
.jbtn{padding:5px 13px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:#475569;transition:all .15s;line-height:1.4}
.jbtn:hover{border-color:#6366f1;color:#6366f1}
.jbtn.active{background:#6366f1;border-color:#6366f1;color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.35)}

/* ─── Main layout ────────────────────────── */
#main{display:flex;flex:1;overflow:hidden}

/* ─── Diagram area ───────────────────────── */
#dwrap{flex:1;overflow:auto;padding:20px;background:#f1f5f9}
#dcanvas{position:relative;width:1520px;height:1230px;background:#fff;border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
#svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* ─── Section backgrounds ────────────────── */
.sec{position:absolute;border-radius:14px;border:1.5px dashed;pointer-events:none}
.sec-lbl{position:absolute;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;opacity:.7;pointer-events:none}

/* ─── Nodes ──────────────────────────────── */
.node{position:absolute;width:180px;transform:translate(-90px,-36px);border-radius:12px;padding:10px 14px;cursor:pointer;border:2px solid transparent;transition:transform .12s,box-shadow .12s,opacity .2s;display:flex;flex-direction:column;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.07);user-select:none}
.node:hover{transform:translate(-90px,-40px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.node.sel{box-shadow:0 0 0 3px rgba(99,102,241,.5),0 4px 16px rgba(0,0,0,.12)}
.node.dim{opacity:.18;pointer-events:none}
.node.hl{opacity:1}
.node-id{font-size:9px;font-weight:800;letter-spacing:.8px;opacity:.55;text-transform:uppercase}
.node-icon{font-size:16px;line-height:1;margin-bottom:1px}
.node-title{font-size:12px;font-weight:700;line-height:1.3}
.node-sub{font-size:10.5px;opacity:.65;line-height:1.3}

/* Category colours */
.c-entry{background:#ede9fe;border-color:#7c3aed;color:#3b0764}
.c-neutral{background:#f0f9ff;border-color:#0284c7;color:#0c4a6e}
.c-success{background:#dcfce7;border-color:#16a34a;color:#14532d}
.c-error{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
.c-pending{background:#fef3c7;border-color:#d97706;color:#78350f}
.c-agreement{background:#faf5ff;border-color:#9333ea;color:#3b0764}
.c-active{background:#d1fae5;border-color:#059669;color:#064e3b}
.c-saved{background:#e0f2fe;border-color:#0284c7;color:#0c4a6e}
.c-warning{background:#fff7ed;border-color:#ea580c;color:#7c2d12}
.c-removed{background:#f3f4f6;border-color:#6b7280;color:#1f2937}

/* ─── Detail panel ───────────────────────── */
#dpanel{width:0;background:#fff;border-left:1px solid #e2e8f0;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1);flex-shrink:0;display:flex;flex-direction:column}
#dpanel.open{width:440px}
#dinner{width:440px;overflow-y:auto;flex:1;padding:24px 24px 40px}
.d-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:10px}
.d-id{font-size:10px;font-weight:800;letter-spacing:.8px;padding:2px 8px;border-radius:5px;display:inline-block;margin-bottom:5px;text-transform:uppercase}
.d-name{font-size:17px;font-weight:800;line-height:1.25;color:#0f172a}
.d-close{background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:4px 6px;border-radius:6px;flex-shrink:0;transition:background .12s}
.d-close:hover{background:#f1f5f9}
.d-sec{margin-bottom:20px}
.d-sec-title{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;margin-bottom:8px}
.d-text{font-size:13px;line-height:1.65;color:#334155}
.d-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.d-list li{font-size:13px;color:#334155;display:flex;align-items:flex-start;gap:7px;line-height:1.55}
.d-list li::before{content:'→';color:#94a3b8;flex-shrink:0;font-size:11px;margin-top:2px}
.bot-msg{background:#f8fafc;border-left:3px solid #6366f1;padding:10px 14px;border-radius:0 8px 8px 0;font-size:12.5px;line-height:1.7;color:#334155;white-space:pre-line}
.state-pill{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.3px;margin:2px;cursor:pointer;transition:opacity .1s}
.state-pill:hover{opacity:.75}
.next-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;margin:3px;cursor:pointer;border:1.5px solid;transition:all .12s}
.next-pill:hover{opacity:.8}
.err-item{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:#dc2626;line-height:1.5;margin-bottom:4px}
.err-item::before{content:'⚠';flex-shrink:0}
.divider{border:none;border-top:1px solid #f1f5f9;margin:16px 0}
.biz-logic{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.65;color:#78350f}
.state-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;background:#1e293b;color:#fff;letter-spacing:.3px}

/* ─── Legend ─────────────────────────────── */
#legend{position:absolute;bottom:16px;left:16px;background:rgba(255,255,255,.95);backdrop-filter:blur(4px);border:1px solid #e2e8f0;border-radius:12px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);z-index:10}
.leg-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:8px}
.leg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px 16px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;white-space:nowrap}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;border:1.5px solid}

/* ─── Scroll hint ────────────────────────── */
#scroll-hint{position:fixed;bottom:20px;right:420px;background:rgba(15,23,42,.85);color:#e2e8f0;font-size:12px;padding:8px 14px;border-radius:20px;pointer-events:none;transition:opacity .3s;opacity:0}
#scroll-hint.show{opacity:1}

/* ─── Telegram mockup ────────────────────── */
.tg-wrap{background:#0e1621;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.22)}
.tg-hdr{background:#17212b;padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.05)}
.tg-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#5b6af0,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.tg-bot-name{font-size:13px;font-weight:700;color:#e8eaed;line-height:1.2}
.tg-bot-sub{font-size:10px;color:#5d7e96;margin-top:1px}
.tg-body{padding:12px 10px 14px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.tg-note{background:rgba(255,255,255,.06);border-radius:8px;padding:8px 12px;text-align:center;font-size:11px;color:#5d7e96;font-style:italic}
.tg-user-wrap{align-self:flex-end;max-width:82%}
.tg-user-inner{background:#2b5278;border-radius:14px 4px 14px 14px;padding:9px 12px}
.tg-user-text{font-size:13px;color:#fff;line-height:1.55;word-break:break-word}
.tg-user-time{font-size:10px;color:#8ba5be;text-align:right;margin-top:3px}
.tg-bubble-wrap{max-width:92%;display:flex;flex-direction:column}
.tg-bubble{background:#17212b;border-radius:4px 14px 14px 14px;padding:10px 13px}
.tg-bubble-text{font-size:13px;color:#d8dde5;line-height:1.6;white-space:pre-line;word-break:break-word}
.tg-bubble-time{font-size:10px;color:#5d7e96;text-align:right;margin-top:5px}
.tg-btns{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.tg-btn-row{display:flex;gap:3px}
.tg-btn-el{flex:1;background:#17212b;border:none;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:500;color:#6ab3f3;cursor:default;text-align:center;font-family:inherit;line-height:1.3;border:1px solid rgba(106,179,243,.15)}
</style>
</head>

  <div id="hdr-left">

<div id="main">

    conns: ['S8-S10','S10-S12','S12-S10'] },

  { id:'returning',label:'🔄 Активний повертається',color:'#059669',
    nodes: ['S13','S11'],
    conns: ['S13-S11'] },

  { id:'nopayment',label:'📧 Email є, без оплати',  color:'#0284c7',
    nodes: ['S14','S5','S6','S8','S10','S11'],
    conns: ['S14-S5','S5-S6','S6-S8','S8-S10','S10-S11'] },

  { id:'renewal',  label:'🔔 Renewal Flow',         color:'#ea580c',
    nodes: ['S13','S15','S16','S17','S5'],
    conns: ['S13-S15','S15-S16','S16-S17','S17-S5','S15-S13','S16-S13'] },
];

/* ═══════════════════════════════════════════
   TELEGRAM MOCKUP
═══════════════════════════════════════════ */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildTgMock(n) {
  const userBubble = n.tgUserMsg ? `
    <div class="tg-user-wrap">
      <div class="tg-user-inner">
        <div class="tg-user-text">${esc(n.tgUserMsg)}</div>
        <div class="tg-user-time">14:31</div>
      </div>
    </div>` : '';

  const btnsHtml = (n.tgBtns && n.tgBtns.length)
    ? `<div class="tg-btns">${n.tgBtns.map(b=>`<div class="tg-btn-el">${esc(b)}</div>`).join('')}</div>`
    : '';

  const botBubble = n.tgMsg ? `
    <div class="tg-bubble-wrap">
      <div class="tg-bubble">
        <div class="tg-bubble-text">${esc(n.tgMsg)}</div>
        <div class="tg-bubble-time">14:32</div>
      </div>
      ${btnsHtml}
    </div>` : '';

  const noteHtml = n.tgNote ? `<div class="tg-note">${esc(n.tgNote)}</div>` : '';

  return `
    <div class="tg-wrap">
      <div class="tg-hdr">
        <div class="tg-avatar">MA</div>
        <div>
          <div class="tg-bot-name">Multimasking Academy Bot</div>
          <div class="tg-bot-sub">бот</div>
        </div>
      </div>
      <div class="tg-body">
        ${noteHtml}${userBubble}${botBubble}
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
let activeJourney = 'all';
let selectedNode = null;

function init() {
  // Build journey buttons
  const jbar = document.getElementById('jbar');
  JOURNEYS.forEach(j => {
    const btn = document.createElement('button');
    btn.className = 'jbtn' + (j.id === 'all' ? ' active' : '');
    btn.textContent = j.label;
    btn.dataset.jid = j.id;
    btn.addEventListener('click', () => selectJourney(j.id));
    jbar.appendChild(btn);
  });

  // Render SVG arrows
  renderArrows();

  // Render nodes
  renderNodes();
}

function renderArrows() {
  const svg = document.getElementById('svg-layer');
  // Clear existing paths (keep defs)
  Array.from(svg.querySelectorAll('path.conn, text.conn-lbl, g.conn-g')).forEach(e => e.remove());

  CONNS.forEach(c => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('conn-g');
    g.dataset.cid = c.id;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.classList.add('conn');
    path.dataset.cid = c.id;
    path.setAttribute('d', c.path);
    path.setAttribute('stroke', '#c8d5e3');
    path.setAttribute('stroke-width', '1.8');
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', 'url(#arr)');
    if (c.dashed) path.setAttribute('stroke-dasharray', '5,4');
    g.appendChild(path);

    if (c.label) {
      // compute midpoint from path
      const mid = getMidPoint(c.path);
      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', mid.x - 30);
      rect.setAttribute('y', mid.y - 8);
      rect.setAttribute('width', '60');
      rect.setAttribute('height', '14');
      rect.setAttribute('rx', '4');
      rect.setAttribute('fill', 'white');
      rect.setAttribute('opacity', '0.85');
      g.appendChild(rect);

      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.classList.add('conn-lbl');
      txt.setAttribute('x', mid.x);
      txt.setAttribute('y', mid.y + 3);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '9');
      txt.setAttribute('font-weight', '600');
      txt.setAttribute('font-family', '-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif');
      txt.setAttribute('fill', '#64748b');
      txt.textContent = c.label;
      g.appendChild(txt);
    }

    svg.appendChild(g);
  });
}

function getMidPoint(pathStr) {
  // Create a temp SVG path element and use getTotalLength
  const tmpSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  tmpSvg.style.position = 'absolute'; tmpSvg.style.visibility = 'hidden';
  document.body.appendChild(tmpSvg);
  const tmpPath = document.createElementNS('http://www.w3.org/2000/svg','path');
  tmpPath.setAttribute('d', pathStr);
  tmpSvg.appendChild(tmpPath);
  const len = tmpPath.getTotalLength();
  const pt = tmpPath.getPointAtLength(len * 0.5);
  document.body.removeChild(tmpSvg);
  return { x: pt.x, y: pt.y };
}

function renderNodes() {
  const layer = document.getElementById('nodes-layer');
  layer.innerHTML = '';
  Object.values(NODES).forEach(n => {
    const div = document.createElement('div');
    div.className = `node ${n.cat}`;
    div.dataset.nid = n.id;
    div.style.left = n.cx + 'px';
    div.style.top = n.cy + 'px';
    div.innerHTML = `
      <div class="node-id">${n.id}</div>
      <div class="node-icon">${n.icon}</div>
      <div class="node-title">${n.title}</div>
      <div class="node-sub">${n.sub}</div>`;
    div.addEventListener('click', () => selectNode(n.id));
    layer.appendChild(div);
  });
}

/* ─── JOURNEY FILTER ─────────────────────── */
function selectJourney(jid) {
  activeJourney = jid;

  // Update buttons
  document.querySelectorAll('.jbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.jid === jid);
  });

  const j = JOURNEYS.find(x => x.id === jid);
  const activeNodes = new Set(j.nodes);
  const activeConns = new Set(j.conns);

  // Update nodes
  document.querySelectorAll('.node').forEach(el => {
    const inJ = activeNodes.has(el.dataset.nid);
    el.classList.toggle('dim', !inJ);
    el.classList.toggle('hl', inJ);
  });

  // Update arrows
  const svg = document.getElementById('svg-layer');
  svg.querySelectorAll('g.conn-g').forEach(g => {
    const inJ = activeConns.has(g.dataset.cid);
    const path = g.querySelector('path');
    const lbl = g.querySelector('text');
    if (inJ) {
      const c = CONNS.find(x => x.id === g.dataset.cid);
      path.setAttribute('stroke', c.color);
      path.setAttribute('stroke-width', '2.2');
      path.setAttribute('opacity', '1');
      if (lbl) { lbl.setAttribute('fill', c.color); lbl.setAttribute('font-size','10'); }
      // swap marker to colored arrowhead
      path.setAttribute('marker-end', getMarker(c.color));
    } else {
      path.setAttribute('stroke', '#e2e8f0');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('opacity', jid === 'all' ? '1' : '0.2');
      path.setAttribute('marker-end', 'url(#arr)');
      if (lbl) { lbl.setAttribute('fill', '#c8d5e3'); lbl.setAttribute('font-size','9'); }
    }
  });
}

function getMarker(color) {
  const map = {
    '#16a34a': 'url(#arr-green)',
    '#dc2626': 'url(#arr-red)',
    '#d97706': 'url(#arr-amber)',
    '#ea580c': 'url(#arr-orange)',
    '#6366f1': 'url(#arr-hi)',
  };
  return map[color] || 'url(#arr)';
}

/* ─── NODE DETAIL PANEL ──────────────────── */
function selectNode(nid) {
  const n = NODES[nid];
  if (!n) return;

  // Deselect previous
  document.querySelectorAll('.node.sel').forEach(el => el.classList.remove('sel'));
  document.querySelector(`.node[data-nid="${nid}"]`).classList.add('sel');
  selectedNode = nid;

  const panel = document.getElementById('dpanel');
  const inner = document.getElementById('dinner');
  panel.classList.add('open');

  // Category label color
  const catColors = {
    'c-entry':'#7c3aed','c-neutral':'#0284c7','c-success':'#16a34a',
    'c-error':'#dc2626','c-pending':'#d97706','c-agreement':'#9333ea',
    'c-active':'#059669','c-saved':'#0284c7','c-warning':'#ea580c','c-removed':'#6b7280'
  };
  const catColor = catColors[n.cat] || '#6b7280';

  // Category labels
  const catLabels = {
    'c-entry':'Точка входу','c-neutral':'Інформація','c-success':'Успіх',
    'c-error':'Помилка','c-pending':'Очікування','c-agreement':'Угода',
    'c-active':'Активний стан','c-saved':'Збережено','c-warning':'Попередження','c-removed':'Видалено'
  };

  const nextPills = (n.next || []).map(sid => {
    const target = NODES[sid];
    if (!target) return '';
    const cc = catColors[target.cat] || '#6b7280';
    return `<span class="next-pill" style="color:${cc};border-color:${cc}20;background:${cc}0d"
      onclick="selectNode('${sid}')">${target.icon} ${sid}: ${target.title}</span>`;
  }).join('');

  inner.innerHTML = `
    <div class="d-hdr">
      <div>
        <div class="d-id" style="background:${catColor}18;color:${catColor}">${n.id} · ${catLabels[n.cat]}</div>
        <div class="d-name">${n.icon} ${n.title}</div>
      </div>
      <button class="d-close" onclick="closePanel()">✕</button>
    </div>

    <div class="d-sec">
      <div class="d-sec-title">Коли показується</div>
      <div class="d-text">${n.when}</div>
    </div>

    <div class="d-sec">
      <div class="d-sec-title">Стан бота</div>
      <span class="state-badge">${n.state}</span>
    </div>

    <div class="d-sec">
      <div class="d-sec-title">Тригер</div>
      <div class="d-text">${n.trigger}</div>
    </div>

    ${n.condition ? `
    <div class="d-sec">
      <div class="d-sec-title">Умова</div>
      <div class="d-text">${n.condition}</div>
    </div>` : ''}

    ${n.userCan && n.userCan.length ? `
    <div class="d-sec">
      <div class="d-sec-title">Що може зробити користувач</div>
      <ul class="d-list">${n.userCan.map(a=>`<li>${a}</li>`).join('')}</ul>
    </div>` : ''}

    <div class="d-sec">
      <div class="d-sec-title">Вигляд в Telegram</div>
      ${buildTgMock(n)}
    </div>

    ${n.biz ? `
    <hr class="divider">
    <div class="d-sec">
      <div class="d-sec-title">Бізнес-логіка</div>
      <div class="biz-logic">${n.biz}</div>
    </div>` : ''}

    ${n.errors && n.errors.length ? `
    <div class="d-sec">
      <div class="d-sec-title">Обробка помилок</div>
      ${n.errors.map(e=>`<div class="err-item">${e}</div>`).join('')}
    </div>` : ''}

    ${n.repeat ? `
    <div class="d-sec">
      <div class="d-sec-title">Повторна логіка</div>
      <div class="d-text">${n.repeat}</div>
    </div>` : ''}

    ${nextPills ? `
    <hr class="divider">
    <div class="d-sec">
      <div class="d-sec-title">Переходи далі</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">${nextPills}</div>
    </div>` : ''}
  `;
}

function closePanel() {
  document.getElementById('dpanel').classList.remove('open');
  document.querySelectorAll('.node.sel').forEach(el => el.classList.remove('sel'));
  selectedNode = null;
}

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// Click on canvas background deselects
document.getElementById('dcanvas').addEventListener('click', e => {
  if (e.target === document.getElementById('dcanvas') || e.target === document.getElementById('nodes-layer')) closePanel();
});

// Init
init();
selectJourney('all');
</script>
</body>
